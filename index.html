<!DOCTYPE html>
<html>
<head>
  <script>
    function isMobile() {
      return /Android|iPhone|iPad|iPod|Opera Mini|IEMobile|WPDesktop/i.test(navigator.userAgent);
    }

    if (isMobile()) {
      window.location.href = "mobile.html";
    } else {
      window.location.href = "pc.html";
    }
  </script>
</head>
<body>
</body>
</html>
