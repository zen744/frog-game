<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Frog Puzzle Game</title>

<style>
  body {
    font-family: Arial;
    text-align: center;
    background: #111;
    color: white;

    display: flex;
    flex-direction: column;
    align-items: center;
  }

  #grid {
    display: grid;
    gap: 2px;
    margin: 20px auto;
  }

  .cell {
    width: 35px;
    height: 35px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: bold;
  }

  .white { background: #eee; color: black; }
  .blue { background: #4da6ff; }
  .red { background: #ff4d4d; }

  .player {
    background: #0066cc;
    color: white;
  }

  textarea, input {
    margin-top: 10px;
    padding: 5px;
  }

  button {
    padding: 10px;
    margin-top: 10px;
  }
</style>
</head>

<body>

<h2>🐸 Frog Puzzle Game</h2>

<button onclick="startGame()">Start Game</button>

<br>
<input id="startPosInput" placeholder="Start position e.g. 3,4">
<button onclick="applyStartPosition()">Set Start</button>

<br>
<textarea id="solutionInput" rows="4" cols="40"
placeholder="Enter moves like: A B C D or ABCD"></textarea>
<br>
<button onclick="playSolution()">▶ Play Solution</button>

<div id="grid"></div>

<script>
let grid = [];
let size;
let frog = {x:0, y:0};
let moveCount = 1;
let moveNumbers = [];
let animationRunning = false;

function startGame() {
  size = parseInt(prompt("Enter grid size (e.g. 6, 10, 20):"));
  if (!size || size < 2) return;

  grid = Array.from({length: size}, () => Array(size).fill("white"));
  moveNumbers = Array.from({length: size}, () => Array(size).fill(""));

  animationRunning = false;

  // default start
  setStart(0,0);
}

function setStart(x, y) {
  grid = Array.from({length: size}, () => Array(size).fill("white"));
  moveNumbers = Array.from({length: size}, () => Array(size).fill(""));

  frog = {x, y};
  grid[y][x] = "blue";

  moveCount = 1;
  moveNumbers[y][x] = moveCount;

  drawGrid();
}

function applyStartPosition() {
  const input = document.getElementById("startPosInput").value.trim();

  if (!input) {
    setStart(0, 0);
    return;
  }

  let parts = input.split(",");

  if (parts.length !== 2) {
    alert("Invalid format! Use x,y");
    return;
  }

  let x = parseInt(parts[0]);
  let y = parseInt(parts[1]);

  if (
    isNaN(x) || isNaN(y) ||
    x < 0 || x >= size ||
    y < 0 || y >= size
  ) {
    alert("Out of bounds!");
    return;
  }

  setStart(x, y);
}

function drawGrid() {
  const container = document.getElementById("grid");
  container.innerHTML = "";
  container.style.gridTemplateColumns = `repeat(${size}, 35px)`;

  for (let y = 0; y < size; y++) {
    for (let x = 0; x < size; x++) {
      const cell = document.createElement("div");

      let className = "cell " + grid[y][x];

      if (x === frog.x && y === frog.y) {
        className += " player";
      }

      cell.className = className;
      cell.textContent = moveNumbers[y][x] || "";

      cell.onclick = () => {
        if (!animationRunning) move(x, y);
      };

      container.appendChild(cell);
    }
  }
}

function move(x, y) {
  const dx = x - frog.x;
  const dy = y - frog.y;

  if (Math.abs(dx) > 1 || Math.abs(dy) > 1) return;
  if (grid[y][x] !== "white") return;

  let dir = {dx: Math.sign(dx), dy: Math.sign(dy)};

  let nx = x + dir.dx;
  let ny = y + dir.dy;

  if (nx >= 0 && nx < size && ny >= 0 && ny < size) {
    if (grid[ny][nx] === "blue") return;
  }

  frog = {x, y};
  grid[y][x] = "blue";

  moveCount++;
  moveNumbers[y][x] = moveCount;

  if (nx >= 0 && nx < size && ny >= 0 && ny < size) {
    if (grid[ny][nx] === "white") {
      grid[ny][nx] = "red";
    }
  }

  drawGrid();
  return checkGame();
}

function playSolution() {
  const input = document.getElementById("solutionInput").value.trim();
  if (!input) return;

  const moves = input.includes(" ")
    ? input.split(/\s+/)
    : input.split("");

  let moveMap = {
    A:{dx:1,dy:0},
    B:{dx:1,dy:1},
    C:{dx:0,dy:1},
    D:{dx:-1,dy:1},
    E:{dx:-1,dy:0},
    F:{dx:-1,dy:-1},
    G:{dx:0,dy:-1},
    H:{dx:1,dy:-1}
  };

  let i = 0;
  animationRunning = true;

  function step() {
    if (i >= moves.length) {
      animationRunning = false;
      return;
    }

    let m = moves[i].toUpperCase();
    let dir = moveMap[m];

    if (dir) {
      let newX = frog.x + dir.dx;
      let newY = frog.y + dir.dy;

      let ended = move(newX, newY);
      if (ended) {
        animationRunning = false;
        return;
      }
    }

    i++;
    setTimeout(step, 300);
  }

  step();
}

function checkGame() {
  // WIN
  let hasWhite = grid.some(row => row.includes("white"));

  if (!hasWhite) {
    setTimeout(() => {
      if (confirm("🎉 You Win! Play again?")) {
        startGame();
      }
    }, 100);
    return true;
  }

  // LOSE
  let canMove = false;

  const directions = [
    {dx:1, dy:0},
    {dx:1, dy:1},
    {dx:0, dy:1},
    {dx:-1, dy:1},
    {dx:-1, dy:0},
    {dx:-1, dy:-1},
    {dx:0, dy:-1},
    {dx:1, dy:-1}
  ];

  for (let d of directions) {
    let nx = frog.x + d.dx;
    let ny = frog.y + d.dy;

    if (nx >= 0 && nx < size && ny >= 0 && ny < size) {
      if (grid[ny][nx] === "white") {
        let nnx = nx + d.dx;
        let nny = ny + d.dy;

        if (
          nnx < 0 || nnx >= size ||
          nny < 0 || nny >= size ||
          grid[nny][nnx] !== "blue"
        ) {
          canMove = true;
          break;
        }
      }
    }
  }

  if (!canMove) {
    setTimeout(() => {
      if (confirm("❌ No moves left! Play again?")) {
        startGame();
      }
    }, 100);
    return true;
  }

  return false;
}
</script>

</body>
</html>
